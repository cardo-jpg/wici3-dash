<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WICI 3 · Lançamento Hire Brazil</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --purple:#8b3dab; --purple-dark:#6a2585; --purple-deep:#2a0f42; --purple-card:#1e0a2e;
      --purple-light:#c07be0; --amber:#f59e0b; --red:#ef4444; --good:#c898ea;
      --bg:#0a0710; --surface:#161022; --border:#2a2038; --text:#f3eefa; --muted:#9a8bb0;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; color:var(--text); min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(1100px 560px at 10% -8%, rgba(139,61,171,.32), transparent 62%),
        radial-gradient(900px 500px at 100% 2%, rgba(120,80,210,.16), transparent 55%),
        radial-gradient(800px 500px at 50% 120%, rgba(139,61,171,.14), transparent 60%),
        #0a0710;
      background-attachment:fixed; }
    .page{ max-width:1400px; margin:0 auto; padding:24px 18px 60px; }

    .top{ display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:18px; }
    .logo{ height:54px; width:auto; display:block; }
    .top-r{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .live{ display:inline-flex; align-items:center; gap:7px; font-size:.72rem; font-weight:700; letter-spacing:.06em; color:#e0c4f0; background:rgba(139,61,171,.18); border:1px solid rgba(192,123,224,.4); padding:6px 12px; border-radius:20px; }
    .live::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--purple-light); box-shadow:0 0 9px var(--purple-light); animation:pulse 1.6s infinite; }
    @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.4; transform:scale(.8);} }
    .presets{ display:flex; background:var(--surface); border:1px solid var(--border); border-radius:9px; overflow:hidden; flex-wrap:wrap; }
    .preset{ padding:7px 12px; font-size:.78rem; cursor:pointer; color:var(--muted); border:none; background:none; font-family:inherit; }
    .preset.active{ background:var(--purple); color:#fff; }
    .updated{ font-size:.72rem; color:var(--muted); }
    .btn{ background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:7px 13px; font-size:.78rem; cursor:pointer; font-family:inherit; }
    .btn:hover{ background:#ffffff12; }

    .tabs{ display:inline-flex; background:var(--surface); border:1px solid var(--border); border-radius:11px; overflow:hidden; margin-bottom:22px; }
    .tab{ padding:10px 26px; font-size:.88rem; font-weight:600; cursor:pointer; color:var(--muted); border:none; background:none; font-family:inherit; }
    .tab.active{ background:var(--purple); color:#fff; }

    /* Gauges */
    .gauges{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:16px; }
    .gauge-card{ background:linear-gradient(160deg, rgba(46,28,66,.6), rgba(18,10,30,.82)); border:1px solid rgba(150,95,190,.2); border-radius:18px; padding:20px; display:flex; flex-direction:column; align-items:center; box-shadow:0 6px 30px rgba(0,0,0,.32); }
    .gauge-title{ font-size:.88rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .gauge-wrap{ position:relative; width:100%; max-width:210px; aspect-ratio:200/140; }
    .gauge-svg{ width:100%; height:100%; overflow:visible; }
    .gauge-track{ fill:none; stroke:#ffffff12; stroke-width:14; stroke-linecap:round; }
    .gauge-fill{ fill:none; stroke-width:14; stroke-linecap:round; transition:stroke-dashoffset .6s ease; }
    .gauge-pct{ position:absolute; left:0; right:0; top:52%; transform:translateY(-50%); text-align:center; font-size:2.1rem; font-weight:800; }
    .gauge-leg{ font-size:12px; font-weight:700; }
    .gauge-stats{ display:flex; gap:22px; margin-top:8px; }
    .gauge-stat{ text-align:center; }
    .gauge-stat-l{ font-size:.74rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    .gauge-stat-v{ font-size:1.35rem; font-weight:800; margin-top:2px; }

    .lbl{ font-size:.84rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:30px 0 14px; }
    .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(205px,1fr)); gap:14px; }
    .card{ background:linear-gradient(165deg, rgba(44,27,64,.55), rgba(22,16,34,.72)); border:1px solid rgba(150,95,190,.16); border-radius:16px; padding:18px 20px; box-shadow:0 4px 22px rgba(0,0,0,.28); transition:transform .15s, border-color .15s; min-height:126px; display:flex; flex-direction:column; justify-content:center; }
    .card:hover{ transform:translateY(-2px); border-color:rgba(192,123,224,.35); }
    .card.hl{ background:linear-gradient(150deg,#7d31a4,#3a1560); border-color:rgba(192,123,224,.5); box-shadow:0 10px 34px rgba(123,45,139,.42); }
    .card .k{ font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
    .card.hl .k{ color:#e2cff0; }
    .card .prev{ font-size:.75rem; color:var(--muted); margin-top:3px; }
    .card .v{ font-size:1.95rem; font-weight:800; margin-top:9px; line-height:1.05; white-space:nowrap; }
    .card .v.accent{ color:var(--purple-light); } .card .v.good{ color:var(--good); }
    .card .tax{ font-size:.75rem; color:var(--muted); margin-top:6px; }

    .charts2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .charts3{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    @media(max-width:1000px){ .charts3{ grid-template-columns:1fr; } }
    @media(max-width:900px){ .charts2{ grid-template-columns:1fr; } .gauges{ grid-template-columns:1fr; } }
    .chart-card{ background:linear-gradient(165deg, rgba(44,27,64,.42), rgba(20,14,30,.7)); border:1px solid rgba(150,95,190,.14); border-radius:16px; padding:18px; box-shadow:0 4px 20px rgba(0,0,0,.25); }
    .chart-title{ font-size:.8rem; font-weight:700; color:var(--text); margin-bottom:12px; }
    .chart-box{ position:relative; }
    .chart-box.tall{ height:300px; }

    .twrap{ overflow-x:auto; border:1px solid var(--border); border-radius:13px; }
    table{ width:100%; border-collapse:collapse; font-size:.92rem; }
    th,td{ padding:14px 16px; text-align:right; white-space:nowrap; border-bottom:1px solid var(--border); }
    th{ color:var(--muted); font-weight:600; font-size:.78rem; text-transform:uppercase; background:#1f1430; position:sticky; top:0; }
    td:first-child,th:first-child{ text-align:left; max-width:320px; white-space:normal; }
    tr:last-child td{ border-bottom:none; }
    .vlink{ color:var(--purple-light); text-decoration:none; font-size:.74rem; }
    .empty,.loading{ text-align:center; color:var(--muted); padding:34px; }
    .err{ color:var(--red); }
    .foot{ margin-top:26px; font-size:.7rem; color:var(--muted); text-align:center; }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <img class="logo" src="logo-wici.png" alt="Workshop Intensivo Carreira Internacional">
      <div class="top-r">
        <span class="live">AO VIVO</span>
        <div class="presets" id="presets">
          <button class="preset" data-d="0" onclick="setPreset(this)">Hoje</button>
          <button class="preset" data-d="3" onclick="setPreset(this)">3 dias</button>
          <button class="preset" data-d="7" onclick="setPreset(this)">7 dias</button>
          <button class="preset" data-d="14" onclick="setPreset(this)">14 dias</button>
          <button class="preset active" data-d="all" onclick="setPreset(this)">Tudo</button>
        </div>
        <button class="btn" onclick="loadAll()">↻ Atualizar</button>
        <div class="updated" id="updated"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-p="geral" onclick="setTab(this)">Geral</button>
      <button class="tab" data-p="malu" onclick="setTab(this)">Malu</button>
      <button class="tab" data-p="hire" onclick="setTab(this)">Hire</button>
    </div>

    <div id="body"><div class="loading">Carregando dados da planilha…</div></div>
    <div class="foot" id="foot">Atualiza automaticamente a cada abertura · dados a partir de 13/07</div>
  </div>

  <script>
    // ── Config ───────────────────────────────────────────────────────────────
    const SHEET_WICI = '1DnIF0UDbdpZ7wV09dEjIkYP8G4H47Tzi7PXOKES5gkI';
    const UTM_MALU   = '1J9USJNVbFsIuih8j_vD5zsG_iP7P_jvp8BGcxldVw9M';
    const UTM_HIRE   = '1RKBwlAGJWFZ72Us4GHU_sron19JY8XuFWRvBOtH0YDA';
    const SHEET_METR = '1V4WEVo5A0TYZ5_1Ez4rb_RHXwd6ExneizW38hzS8YZE';   // aba MÉTRICAS (compradores/vendas)
    const START = new Date(2026, 6, 13);          // 13/07/2026 (piso dos dados)
    const EVENT = new Date(2026, 7, 15);          // 15/08/2026 (evento) — p/ meta/dia
    const METAS_DEFAULT = { leads:1170, investimento:87750, cpa:71, cpm:25, ctr:0.80, connect_rate:82,
      cotacao:5.16, data_inicio:'13/07/2026', data_evento:'15/08 e 16/08' };

    let DATA = { malu:[], hire:[], umalu:[], uhire:[], metas:{...METAS_DEFAULT}, metricas:null };
    let profile = 'geral', presetDays = 'all';

    const BRL = v => (v==null||isNaN(v)) ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    const BRLk= v => (v==null||isNaN(v)) ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
    const NUM = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
    const PCT = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
    const RS  = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) + 'x';
    const div = (a,b) => b ? a/b : 0;
    const dkey = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

    function parseBR(s){
      if(s==null) return 0; if(typeof s==='number') return s;
      s=String(s).replace(/R\$/g,'').replace(/%/g,'').replace(/ /g,'').trim();
      if(!s) return 0; s=s.replace(/\./g,'').replace(',','.');
      const n=parseFloat(s); return isNaN(n)?0:n;
    }

    // ── gviz JSONP ────────────────────────────────────────────────────────────
    let _seq=0;
    function gviz(sheetId, query){
      return new Promise((resolve,reject)=>{
        const cb='__gv_'+(++_seq)+'_'+Date.now();
        const s=document.createElement('script');
        const done=()=>{ try{delete window[cb];}catch(e){} if(s.parentNode)s.parentNode.removeChild(s); clearTimeout(tm); };
        const tm=setTimeout(()=>{done();reject(new Error('timeout'));},25000);
        window[cb]=r=>{ done(); (r&&r.table)?resolve(r.table):reject(new Error('vazio')); };
        s.onerror=()=>{done();reject(new Error('rede'));};
        s.src='https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?'+query+'&tqx=responseHandler:'+cb;
        document.head.appendChild(s);
      });
    }
    const cNum = c => !c ? 0 : (typeof c.v==='number' ? c.v : parseBR(c.f!=null?c.f:c.v));
    const cStr = c => !c ? '' : (c.f!=null?c.f:(c.v!=null?String(c.v):''));
    const cDate= c => {
      if(!c) return null;
      const f=String(c.f||c.v||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
      if(f){ let y=+f[3]; if(y<100)y+=2000; return new Date(y,+f[2]-1,+f[1]); }
      const d=String(c.v||'').match(/Date\((\d+),(\d+),(\d+)/); if(d) return new Date(+d[1],+d[2],+d[3]);
      return null;
    };

    function metaRows(table){
      const out=[];
      for(const r of (table.rows||[])){
        const c=r.c||[]; const d=cDate(c[0]); if(!d||d<START) continue;
        out.push({ date:d, campanha:cStr(c[1]), cost:cNum(c[3]), impressions:cNum(c[4]), reach:cNum(c[5]),
          clicks:cNum(c[6]), pageview:cNum(c[7]), ic:cNum(c[8]), compras:cNum(c[9]),
          link:cStr(c[10]), anuncio:cStr(c[11]), faturamento:cNum(c[12]) });
      }
      return out;
    }
    function utmRows(table){
      // Date, Email, utm_source, utm_campaign, utm_medium, utm_content, utm_term
      const out=[];
      for(const r of (table.rows||[])){
        const c=r.c||[]; const d=cDate(c[0]); if(!d||d<START) continue;
        out.push({ date:d, source:cStr(c[2])||'—', campaign:cStr(c[3])||'—',
          content:cStr(c[5])||'—', term:cStr(c[6])||'—' });
      }
      return out;
    }
    function readMetas(table){
      const rows=[];
      if(table.cols&&table.cols.length) rows.push(table.cols.map(c=>c.label!=null?c.label:(c.id||'')));
      for(const r of (table.rows||[])) rows.push((r.c||[]).map(c=>c?(c.f!=null?c.f:(c.v!=null?String(c.v):'')):''));
      const m={...METAS_DEFAULT};
      for(const r of rows){
        const k=(r[0]||'').toString().trim().toLowerCase(); const v=r[1]!=null?r[1]:'';
        if(k.includes('leads')){ if(parseBR(v))m.leads=parseBR(v); }
        else if(k.includes('investimento')){ if(parseBR(v))m.investimento=parseBR(v); if(r[4])m.data_inicio=String(r[4]).trim(); if(r[8])m.data_evento=String(r[8]).trim(); }
        else if(k==='cpa'){ if(parseBR(v))m.cpa=parseBR(v); }
        else if(k==='cpm'){ if(parseBR(v))m.cpm=parseBR(v); }
        else if(k==='ctr'){ if(parseBR(v))m.ctr=parseBR(v); }
        else if(k.includes('connect')){ if(parseBR(v))m.connect_rate=parseBR(v); }
        else if(k.includes('cotac')||k.includes('dolar')||k.includes('dólar')||k.includes('cambio')||k.includes('câmbio')||k==='usd'){ if(parseBR(v))m.cotacao=parseBR(v); }
      }
      return m;
    }

    // aba MÉTRICAS: DATA,WA_START,WA_VIP,VENDAS_ORG,PACE_DIA,PACE_MED,FALTA,%META,START_ORG,VIP_ORG,START_ADS,VIP_ADS,TOTAL
    function metricasParse(table){
      const rows=table.rows||[]; let latest=null; const series=[];
      for(const r of rows){
        const c=r.c||[]; const d=cDate(c[0]); if(!d) continue;
        const org=cNum(c[3]), total=cNum(c[12]);
        series.push({ date:d, org, paceDia:cNum(c[4]), total });
        if(org>0||total>0) latest={ data:d, whatsapp_start:cNum(c[1]), whatsapp_vip:cNum(c[2]),
          vendas_org:org, pace_diario:cNum(c[4]), pace_medio:cNum(c[5]), falta_meta:cNum(c[6]), pct_meta:parseBR(cStr(c[7])),
          start_org:cNum(c[8]), vip_org:cNum(c[9]), start_ads:cNum(c[10]), vip_ads:cNum(c[11]), total };
      }
      if(latest) latest.meta = latest.falta_meta + latest.total;
      return { latest, series };
    }

    // ── Filtro por preset ──────────────────────────────────────────────────────
    function cutoff(){
      if(presetDays==='all') return START;
      const t=new Date(); t.setHours(0,0,0,0);
      const c=new Date(t); c.setDate(c.getDate()-Number(presetDays));
      return c<START?START:c;
    }
    const inRange = d => d>=cutoff();

    // ── Aggregation ─────────────────────────────────────────────────────────────
    function metaAgg(rows){
      let cost=0,imp=0,reach=0,clk=0,pv=0,ic=0,comp=0,fat=0;
      for(const r of rows){ cost+=r.cost;imp+=r.impressions;reach+=r.reach;clk+=r.clicks;pv+=r.pageview;ic+=r.ic;comp+=r.compras;fat+=r.faturamento; }
      return { investido:cost, impressoes:imp, alcance:reach, cliques:clk, pageviews:pv, initiate_checkout:ic, vendas:comp, faturamento:fat,
        ctr:div(clk,imp)*100, cpm:div(cost,imp)*1000, cpc:div(cost,clk), cpa:div(cost,comp), roas:div(fat,cost), ticket:div(fat,comp), connect_rate:div(pv,clk)*100 };
    }
    function topBy(rows, field, n){
      const by={}; for(const r of rows){ const k=r[field]||'—'; by[k]=(by[k]||0)+1; }
      return Object.entries(by).map(([label,count])=>({label,count})).sort((a,b)=>b.count-a.count).slice(0,n);
    }
    function anuncios(rows){
      const by={};
      for(const r of rows){ const key=r.anuncio||r.campanha||'(sem nome)'; let o=by[key];
        if(!o) o=by[key]={nome:key,link:r.link,cost:0,impressions:0,clicks:0,ic:0,compras:0,faturamento:0};
        o.cost+=r.cost;o.impressions+=r.impressions;o.clicks+=r.clicks;o.ic+=r.ic;o.compras+=r.compras;o.faturamento+=r.faturamento;
        if(!o.link&&r.link)o.link=r.link;
      }
      return Object.values(by).map(o=>({nome:o.nome,link:o.link,investido:o.cost,impressoes:o.impressions,cliques:o.clicks,
        initiate_checkout:o.ic,vendas:o.compras,faturamento:o.faturamento,cpa:div(o.cost,o.compras),roas:div(o.faturamento,o.cost),ctr:div(o.clicks,o.impressions)*100}))
        .sort((a,b)=>b.investido-a.investido);
    }
    // série diária: leads (UTM) + investido (Meta)
    function daily(metaR, utmR){
      const map={};
      const get=k=>map[k]||(map[k]={leads:0,inv:0,vendas:0});
      for(const r of utmR) get(dkey(r.date)).leads++;
      for(const r of metaR){ const o=get(dkey(r.date)); o.inv+=r.cost; o.vendas+=r.compras; }
      return Object.keys(map).sort().map(k=>({date:k,...map[k]}));
    }

    // ── Render ──────────────────────────────────────────────────────────────────
    const ARC=298.5;
    function gauge(id, title, atual, meta, fmt, mediaDia, metaDia){
      const pct = meta? Math.min(100,Math.max(0,atual/meta*100)) : 0;
      return `<div class="gauge-card"><div class="gauge-title">${title}</div>
        <div class="gauge-wrap"><svg class="gauge-svg" viewBox="0 0 200 140">
          <path class="gauge-track" d="M5,110 A95,95,0,0,1,195,110"/>
          <path class="gauge-fill" d="M5,110 A95,95,0,0,1,195,110" stroke="url(#pg)"
            stroke-dasharray="${ARC} ${ARC}" stroke-dashoffset="${ARC*(1-pct/100)}"/>
          <defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5a1e68"/><stop offset="100%" stop-color="#a855c8"/></linearGradient></defs>
          <text x="5" y="132" class="gauge-leg" text-anchor="middle" fill="rgba(255,255,255,.7)">${fmt(atual)}</text>
          <text x="195" y="132" class="gauge-leg" text-anchor="middle" fill="rgba(255,255,255,.35)">${meta?fmt(meta):'—'}</text>
        </svg><div class="gauge-pct">${pct.toLocaleString('pt-BR',{maximumFractionDigits:1})}%</div></div>
        <div class="gauge-stats">
          <div class="gauge-stat"><div class="gauge-stat-l">Média/dia</div><div class="gauge-stat-v">${mediaDia}</div></div>
          <div class="gauge-stat"><div class="gauge-stat-l">Meta/dia</div><div class="gauge-stat-v">${metaDia}</div></div>
        </div></div>`;
    }
    function card(k,v,cls,prev,tax){ return `<div class="card ${cls&&cls.includes('hl')?'hl':''}"><div class="k">${k}</div>${prev?`<div class="prev">${prev}</div>`:''}<div class="v ${cls||''}">${v}</div>${tax?`<div class="tax">${tax}</div>`:''}</div>`; }

    let charts=[];
    function killCharts(){ charts.forEach(c=>{try{c.destroy();}catch(e){}}); charts=[]; }

    function render(){
      killCharts();
      const mrows = (profile==='malu'?DATA.malu:profile==='hire'?DATA.hire:DATA.malu.concat(DATA.hire)).filter(r=>inRange(r.date));
      const urows = (profile==='malu'?DATA.umalu:profile==='hire'?DATA.uhire:DATA.umalu.concat(DATA.uhire)).filter(r=>inRange(r.date));
      const k=metaAgg(mrows), m=DATA.metas;
      const leads=urows.length;

      // dias
      const today=new Date(); today.setHours(0,0,0,0);
      const daysElapsed=Math.max(1, Math.round((today-START)/864e5)+1);
      const daysTotal=Math.max(1, Math.round((EVENT-START)/864e5)+1);
      const cpl=div(k.investido,leads);

      const mc = DATA.metricas && DATA.metricas.latest;
      const ingressos = mc ? mc.total : k.vendas;
      const metaIng = mc ? mc.meta : 1800;
      let h='';
      // Gauges (vendas, sem leads)
      const orgSales = mc ? mc.vendas_org : 0;
      h+=`<div class="gauges">`;
      h+=gauge('g1','Ingressos Vendidos', ingressos, metaIng, NUM, mc?NUM(Math.round(mc.pace_medio)):NUM(Math.round(ingressos/daysElapsed)), NUM(Math.round(metaIng/daysTotal)));
      h+=gauge('g2','Vendas Orgânico', orgSales, metaIng, NUM, mc?NUM(Math.round(mc.pace_medio)):'—', NUM(Math.round(metaIng/daysTotal)));
      h+=gauge('g3','Investimento', k.investido, m.investimento, BRLk, BRLk(k.investido/daysElapsed), BRLk(m.investimento/daysTotal));
      h+=`</div>`;

      // ── 1) Tráfego · Ads (Meta Ads) ──
      h+=`<div class="lbl">Tráfego · Ads (Meta Ads)</div><div class="grid">`;
      h+=card('Investimento Total', BRL(k.investido), 'hl v', 'Previsto: '+BRLk(m.investimento), 'Taxa investida '+PCT(div(k.investido,m.investimento)*100))
        +card('Vendas Ads', NUM(k.vendas), 'accent')
        +(mc?card('START ADS', NUM(mc.start_ads)):'')
        +(mc?card('VIP ADS', NUM(mc.vip_ads)):'')
        +card('CPA', BRL(k.cpa))
        +card('CTR', PCT(k.ctr))
        +card('CPC', BRL(k.cpc))
        +card('CPM', BRL(k.cpm))
        +card('Initiate Checkout', NUM(k.initiate_checkout));
      h+=`</div>`;

      // ── 2) Vendas Orgânicas ──
      if(mc){
        h+=`<div class="lbl">Vendas Orgânicas</div><div class="grid">`;
        h+=card('Ingressos Vendidos', NUM(mc.total), 'hl v', 'Meta: '+NUM(mc.meta), PCT(mc.pct_meta)+' da meta')
          +card('Vendas Workshop ORG', NUM(mc.vendas_org), 'accent')
          +card('START ORG', NUM(mc.start_org))
          +card('VIP ORG', NUM(mc.vip_org))
          +card('Grupo WhatsApp START', NUM(mc.whatsapp_start))
          +card('Grupo WhatsApp VIP', NUM(mc.whatsapp_vip));
        h+=`</div>`;
      }

      // ── 3) Gráfico por dia (largura total) ──
      h+=`<div class="lbl">Vendas e Investimento por Dia</div>
        <div class="chart-card"><div class="chart-box tall"><canvas id="cDia"></canvas></div></div>`;

      // ── 4) Posicionamento dos Leads (UTMs) — 3 colunas ──
      h+=`<div class="lbl">Posicionamento dos Leads (UTMs)</div><div class="charts3">
        <div class="chart-card"><div class="chart-title">Origem</div><div class="chart-box tall"><canvas id="cOrig"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Top Anúncios</div><div class="chart-box tall"><canvas id="cAds"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Públicos</div><div class="chart-box tall"><canvas id="cPub"></canvas></div></div>
      </div>`;

      // Anúncios
      const ads=anuncios(mrows);
      h+=`<div class="lbl">Por anúncio (${ads.length})</div><div class="twrap"><table><thead><tr>
        <th>Anúncio</th><th>Investido</th><th>Impressões</th><th>Cliques</th><th>CTR</th><th>Init. Checkout</th><th>Vendas</th><th>CPA</th><th></th>
      </tr></thead><tbody>`;
      if(!ads.length) h+=`<tr><td colspan="9" class="empty">Sem dados no período</td></tr>`;
      else for(const a of ads) h+=`<tr><td title="${a.nome}">${a.nome}</td><td>${BRL(a.investido)}</td><td>${NUM(a.impressoes)}</td><td>${NUM(a.cliques)}</td><td>${PCT(a.ctr)}</td><td>${NUM(a.initiate_checkout)}</td><td>${NUM(a.vendas)}</td><td>${BRL(a.cpa)}</td><td>${a.link?`<a class="vlink" href="${a.link}" target="_blank">▶ ver</a>`:'—'}</td></tr>`;
      h+=`</tbody></table></div>`;

      document.getElementById('body').innerHTML=h;
      document.getElementById('updated').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const footEl=document.getElementById('foot'); if(footEl) footEl.textContent='Atualiza a cada abertura · dados de 13/07 em diante · investimento convertido a R$ '+(m.cotacao||5.16).toLocaleString('pt-BR',{minimumFractionDigits:2})+'/US$';

      // Charts — vendas orgânicas/dia (barras) + investido/dia (linha)
      const invByDay={}; for(const r of mrows){ const kd=dkey(r.date); invByDay[kd]=(invByDay[kd]||0)+r.cost; }
      const ms=((DATA.metricas&&DATA.metricas.series)||[]).filter(s=>s.date>=cutoff());
      const dlabels=ms.map(s=>String(s.date.getDate()).padStart(2,'0')+'/'+String(s.date.getMonth()+1).padStart(2,'0'));
      charts.push(new Chart(document.getElementById('cDia'),{
        data:{ labels:dlabels, datasets:[
          { type:'bar', label:'Vendas Org/dia', data:ms.map(s=>s.paceDia), backgroundColor:'#b565d6cc', borderRadius:5, yAxisID:'y' },
          { type:'line', label:'Investido/dia', data:ms.map(s=>invByDay[dkey(s.date)]||0), borderColor:'#e6ccf5', backgroundColor:'rgba(230,204,245,.12)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#e6ccf5', tension:.35, yAxisID:'y1' },
        ]},
        options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
          plugins:{ legend:{labels:{color:'#cbb8dd',boxWidth:14,font:{size:12}}}, tooltip:{callbacks:{label:c=>c.dataset.label.indexOf('Investido')>=0?` Investido: `+BRL(c.parsed.y):` Vendas: ${c.parsed.y}`}} },
          scales:{ x:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0',font:{size:11}}}, y:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0'},beginAtZero:true},
            y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#e6ccf5',callback:v=>'R$'+Math.round(v)},beginAtZero:true} } }
      }));
      hbar('cOrig', topBy(urows,'source',8));
      hbar('cAds',  topBy(urows,'content',8));
      hbar('cPub',  topBy(urows,'term',8));
    }

    function hbar(id, items){
      const el=document.getElementById(id); if(!el) return;
      const valPlugin={ id:'v'+id, afterDatasetsDraw(ch){ const c=ch.ctx; c.save(); ch.getDatasetMeta(0).data.forEach((bar,i)=>{ const v=ch.data.datasets[0].data[i]; c.fillStyle='rgba(255,255,255,.85)'; c.font='600 12px system-ui'; c.textAlign='left'; c.textBaseline='middle'; c.fillText(v, bar.x+6, bar.y); }); c.restore(); } };
      charts.push(new Chart(el,{ type:'bar', data:{ labels:items.map(i=>i.label.length>26?i.label.slice(0,25)+'…':i.label), datasets:[{ data:items.map(i=>i.count), backgroundColor:'#b565d6cc', borderRadius:5, barThickness:20 }] },
        options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.x+' leads'}}},
          scales:{ x:{display:false,beginAtZero:true}, y:{grid:{display:false},ticks:{color:'#ccc',font:{size:12}}} }, layout:{padding:{right:34}} },
        plugins:[valPlugin] }));
    }

    function setTab(el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); profile=el.dataset.p; render(); }
    function setPreset(el){ document.querySelectorAll('.preset').forEach(t=>t.classList.remove('active')); el.classList.add('active'); presetDays=el.dataset.d; render(); }

    async function loadAll(){
      document.getElementById('body').innerHTML='<div class="loading">Carregando dados da planilha…</div>';
      try{
        const [tMalu,tHire,tMetas,tuMalu,tuHire,tMetr]=await Promise.all([
          gviz(SHEET_WICI,'sheet='+encodeURIComponent('Malu Meta')),
          gviz(SHEET_WICI,'sheet='+encodeURIComponent('Hire Meta')),
          gviz(SHEET_WICI,'sheet='+encodeURIComponent('Metas')).catch(()=>null),
          gviz(UTM_MALU,"gid=0&tq="+encodeURIComponent("select * where A >= date '2026-07-13'")).catch(()=>null),
          gviz(UTM_HIRE,"gid=0&tq="+encodeURIComponent("select * where A >= date '2026-07-13'")).catch(()=>null),
          gviz(SHEET_METR,'sheet='+encodeURIComponent('MÉTRICAS')).catch(()=>null),
        ]);
        DATA.malu=metaRows(tMalu); DATA.hire=metaRows(tHire);
        DATA.umalu=tuMalu?utmRows(tuMalu):[]; DATA.uhire=tuHire?utmRows(tuHire):[];
        DATA.metas=tMetas?readMetas(tMetas):{...METAS_DEFAULT};
        DATA.metricas=tMetr?metricasParse(tMetr):null;
        // Cost vem em US$ (conta do Meta) → converte p/ R$ pela cotação (aba Metas ou 5,16)
        const cot = DATA.metas.cotacao || 5.16;
        DATA.malu.forEach(r=>{ r.cost *= cot; });
        DATA.hire.forEach(r=>{ r.cost *= cot; });
        render();
      }catch(e){
        document.getElementById('body').innerHTML='<div class="empty err">Erro ao carregar: '+e.message+'</div>';
      }
    }
    loadAll();
  </script>
</body>
</html>
