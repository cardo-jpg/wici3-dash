<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WICI 3 · Lançamento Hire Brazil</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --purple:#8b3dab; --purple-dark:#6a2585; --purple-deep:#2a0f42; --purple-card:#1e0a2e;
      --purple-light:#c07be0; --amber:#f59e0b; --red:#ef4444; --good:#c898ea;
      --bg:#0a0710; --surface:#161022; --border:#2a2038; --text:#f3eefa; --muted:#9a8bb0;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; color:var(--text); min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(1100px 560px at 10% -8%, rgba(139,61,171,.32), transparent 62%),
        radial-gradient(900px 500px at 100% 2%, rgba(120,80,210,.16), transparent 55%),
        radial-gradient(800px 500px at 50% 120%, rgba(139,61,171,.14), transparent 60%),
        #0a0710;
      background-attachment:fixed; }
    .page{ max-width:1400px; margin:0 auto; padding:24px 18px 60px; }

    .top{ display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:18px; }
    .logo{ height:54px; width:auto; display:block; }
    .top-r{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .live{ display:inline-flex; align-items:center; gap:7px; font-size:.72rem; font-weight:700; letter-spacing:.06em; color:#e0c4f0; background:rgba(139,61,171,.18); border:1px solid rgba(192,123,224,.4); padding:6px 12px; border-radius:20px; }
    .live::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--purple-light); box-shadow:0 0 9px var(--purple-light); animation:pulse 1.6s infinite; }
    @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.4; transform:scale(.8);} }
    .presets{ display:flex; background:var(--surface); border:1px solid var(--border); border-radius:9px; overflow:hidden; flex-wrap:wrap; }
    .preset{ padding:7px 12px; font-size:.78rem; cursor:pointer; color:var(--muted); border:none; background:none; font-family:inherit; }
    .preset.active{ background:var(--purple); color:#fff; }
    .dates{ display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:4px 8px; }
    .dlbl{ font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    .dates input[type=date]{ background:transparent; border:1px solid var(--border); border-radius:6px; color:#fff;
      font-family:inherit; font-size:.76rem; padding:4px 6px; color-scheme:dark; cursor:pointer; }
    .dates input[type=date]:focus{ outline:none; border-color:var(--purple); }
    .dclear{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:.9rem; padding:2px 4px; font-family:inherit; }
    .dclear:hover{ color:#fff; }
    .updated{ font-size:.72rem; color:var(--muted); }
    .btn{ background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:7px 13px; font-size:.78rem; cursor:pointer; font-family:inherit; }
    .btn:hover{ background:#ffffff12; }

    .tabs{ display:inline-flex; background:var(--surface); border:1px solid var(--border); border-radius:11px; overflow:hidden; margin-bottom:22px; }
    .tab{ padding:10px 26px; font-size:.88rem; font-weight:600; cursor:pointer; color:var(--muted); border:none; background:none; font-family:inherit; }
    .tab.active{ background:var(--purple); color:#fff; }

    /* Gauges */
    /* auto-fit: 4 gauges lado a lado no desktop, quebrando sozinho quando aperta. */
    .gauges{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px; margin-bottom:16px; }
    /* Pace: verde = o ritmo atual dá conta; vermelho = precisa acelerar. */
    .gauge-stat-v.pc-ok{ color:#4ade80; }
    .gauge-stat-v.pc-bad{ color:#f87171; }
    .gauge-sub{ font-size:.72rem; color:#c9a9e0; margin-top:-6px; margin-bottom:2px; letter-spacing:.02em; }
    .gauge-card{ background:linear-gradient(160deg, rgba(120,58,155,.4), rgba(38,20,58,.85)); border:1px solid rgba(192,123,224,.34); border-radius:20px; padding:26px 22px; display:flex; flex-direction:column; align-items:center; box-shadow:0 10px 44px rgba(139,61,171,.28); }
    .gauge-card:hover{ border-color:rgba(206,140,235,.55); }
    .gauge-title{ font-size:.98rem; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:#e0c4f0; margin-bottom:10px; }
    .gauge-wrap{ position:relative; width:100%; max-width:210px; aspect-ratio:200/140; }
    .gauge-svg{ width:100%; height:100%; overflow:visible; }
    .gauge-track{ fill:none; stroke:#ffffff12; stroke-width:14; stroke-linecap:round; }
    .gauge-fill{ fill:none; stroke-width:14; stroke-linecap:round; transition:stroke-dashoffset .6s ease; }
    .gauge-pct{ position:absolute; left:0; right:0; top:52%; transform:translateY(-50%); text-align:center; font-size:2.5rem; font-weight:800; text-shadow:0 2px 12px rgba(192,123,224,.4); }
    .gauge-leg{ font-size:12px; font-weight:700; }
    .gauge-stats{ display:flex; gap:22px; margin-top:8px; }
    .gauge-stat{ text-align:center; }
    .gauge-stat-l{ font-size:.74rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    .gauge-stat-v{ font-size:1.35rem; font-weight:800; margin-top:2px; }

    .lbl{ font-size:.84rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:30px 0 14px; }
    .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(205px,1fr)); gap:14px; }
    .card{ background:linear-gradient(165deg, rgba(96,56,132,.42), rgba(58,36,84,.55)); border:1px solid rgba(168,110,205,.24); border-radius:16px; padding:18px 20px; box-shadow:0 4px 22px rgba(0,0,0,.28); transition:transform .15s, border-color .15s; min-height:126px; display:flex; flex-direction:column; justify-content:center; }
    .card:hover{ transform:translateY(-2px); border-color:rgba(192,123,224,.5); }
    .card.hl{ background:linear-gradient(150deg,#8a37b4,#42186e); border-color:rgba(206,140,235,.55); box-shadow:0 10px 34px rgba(139,61,171,.5); }
    .card .k{ font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
    .card.hl .k{ color:#e2cff0; }
    .card .prev{ font-size:.75rem; color:var(--muted); margin-top:3px; }
    .card .v{ font-size:1.95rem; font-weight:800; margin-top:9px; line-height:1.05; white-space:nowrap; }
    .card .v.accent{ color:var(--purple-light); } .card .v.good{ color:var(--good); }
    .card .tax{ font-size:.75rem; color:var(--muted); margin-top:6px; }

    .charts2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .charts3{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    @media(max-width:1000px){ .charts3{ grid-template-columns:1fr; } }
    @media(max-width:900px){ .charts2{ grid-template-columns:1fr; } .gauges{ grid-template-columns:1fr; } }
    .chart-card{ background:linear-gradient(165deg, rgba(44,27,64,.42), rgba(20,14,30,.7)); border:1px solid rgba(150,95,190,.14); border-radius:16px; padding:18px; box-shadow:0 4px 20px rgba(0,0,0,.25); }
    .chart-title{ font-size:.8rem; font-weight:700; color:var(--text); margin-bottom:12px; }
    .chart-box{ position:relative; }
    .chart-box.tall{ height:300px; }

    .twrap{ overflow-x:auto; border:1px solid var(--border); border-radius:13px; }
    table{ width:100%; border-collapse:collapse; font-size:.92rem; }
    th,td{ padding:14px 16px; text-align:right; white-space:nowrap; border-bottom:1px solid var(--border); }
    th{ color:var(--muted); font-weight:600; font-size:.78rem; text-transform:uppercase; background:#1f1430; position:sticky; top:0; }
    td:first-child,th:first-child{ text-align:left; max-width:320px; white-space:normal; }
    tr:last-child td{ border-bottom:none; }
    .vlink{ color:var(--purple-light); text-decoration:none; font-size:.74rem; }
    .w3filter{ width:100%; max-width:340px; margin:0; padding:11px 14px; background:rgba(30,20,44,.7); border:1px solid rgba(150,95,190,.2); border-radius:10px; color:var(--text); font-family:inherit; font-size:.85rem; }
    .fbar{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin:0 0 14px; }
    .stbtns{ display:inline-flex; gap:6px; }
    .stbtn{ padding:9px 14px; border-radius:9px; border:1px solid rgba(150,95,190,.28); background:rgba(30,20,44,.55); color:var(--muted); font-family:inherit; font-size:.8rem; font-weight:600; cursor:pointer; white-space:nowrap; }
    .stbtn:hover{ color:var(--text); border-color:rgba(150,95,190,.5); }
    .stbtn.active{ background:var(--purple); border-color:var(--purple); color:#fff; }
    .w3filter::placeholder{ color:var(--muted); }
    th.sortable{ cursor:pointer; user-select:none; transition:color .12s; }
    th.sortable:hover{ color:var(--purple-light); }
    .al{ display:inline-block; font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:7px; white-space:nowrap; }
    .al-ok{ color:#8ef0b0; background:rgba(34,197,94,.14); border:1px solid rgba(34,197,94,.4); }
    .al-alto{ color:#f5cd6b; background:rgba(245,158,11,.14); border:1px solid rgba(245,158,11,.4); }
    .al-crit{ color:#f79a9a; background:rgba(239,68,68,.16); border:1px solid rgba(239,68,68,.45); }
    .al-sem{ color:#c9b8d6; background:rgba(120,90,150,.18); border:1px solid rgba(150,95,190,.35); }
    .tp{ display:inline-block; font-size:.72rem; font-weight:700; padding:3px 9px; border-radius:7px; white-space:nowrap; }
    .tp-q{ color:#f5b78a; background:rgba(245,120,60,.14); border:1px solid rgba(245,120,60,.4); }
    .tp-f{ color:#9cc7f0; background:rgba(90,150,240,.14); border:1px solid rgba(90,150,240,.4); }
    .tp-n{ color:var(--muted); }
    .st{ display:inline-block; font-size:.72rem; font-weight:700; padding:3px 9px; border-radius:7px; white-space:nowrap; }
    .st-on{ color:#8ef0b0; background:rgba(34,197,94,.16); border:1px solid rgba(34,197,94,.45); }
    .st-off{ color:#c9b8d6; background:rgba(120,90,150,.18); border:1px solid rgba(150,95,190,.35); }
    .st-bad{ color:#f79a9a; background:rgba(239,68,68,.16); border:1px solid rgba(239,68,68,.45); }
    .st-none{ color:var(--muted); }
    .lp-win{ color:#8ef0b0; font-weight:800; }
    .lp-grid{ display:flex; flex-direction:column; gap:24px; }
    .lp-geral{ background:linear-gradient(150deg,#8a37b4,#42186e); border:1px solid rgba(206,140,235,.5); border-radius:16px; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:22px; box-shadow:0 8px 30px rgba(139,61,171,.35); }
    .lp-geral-lbl{ font-size:.92rem; font-weight:800; letter-spacing:.05em; }
    .lp-geral-stats{ display:flex; gap:34px; flex-wrap:wrap; }
    .lp-panel{ background:linear-gradient(165deg, rgba(60,36,86,.4), rgba(24,16,36,.7)); border:1px solid rgba(150,95,190,.2); border-radius:16px; padding:20px 22px; box-shadow:0 4px 20px rgba(0,0,0,.25); }
    .lp-header{ display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:18px; padding-bottom:16px; border-bottom:1px solid rgba(150,95,190,.16); }
    .lp-header-name{ font-size:1.15rem; font-weight:800; }
    .lp-header-url{ display:block; font-size:.74rem; color:var(--purple-light); text-decoration:none; opacity:.7; margin-top:3px; }
    .lp-header-url:hover{ opacity:1; }
    .lp-header-right{ display:flex; gap:28px; flex-wrap:wrap; }
    .lp-meta-lbl{ font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
    .lp-meta-val{ font-size:1.4rem; font-weight:800; margin-top:2px; }
    .lp-meta-val.accent{ color:var(--purple-light); }
    .lp-body{ display:grid; grid-template-columns:1fr 1fr; gap:22px; align-items:start; }
    @media(max-width:900px){ .lp-body{ grid-template-columns:1fr; } }
    .fn{ display:flex; flex-direction:column; gap:5px; }
    .fn-seg{ height:84px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .fn-lbl{ font-size:.66rem; font-weight:700; letter-spacing:.06em; color:rgba(255,255,255,.75); }
    .fn-val{ font-size:1.5rem; font-weight:800; color:#fff; margin-top:3px; }
    .fn-rate{ text-align:center; margin:1px 0; }
    .fn-pill{ display:inline-block; font-size:.7rem; font-weight:700; color:#e0c4f0; background:rgba(24,16,36,.75); border:1px solid rgba(192,123,224,.4); padding:4px 13px; border-radius:20px; }
    .lp-charts-col{ display:flex; flex-direction:column; gap:14px; }
    .lp-chart-card{ background:rgba(30,20,44,.5); border:1px solid rgba(150,95,190,.16); border-radius:12px; padding:14px 16px; }
    .lp-chart-title{ font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:10px; }
    .lp-chart-h{ height:118px; }
    .empty,.loading{ text-align:center; color:var(--muted); padding:34px; }
    .err{ color:var(--red); }
    .foot{ margin-top:26px; font-size:.7rem; color:var(--muted); text-align:center; }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <img class="logo" src="logo-wici.png" alt="Workshop Intensivo Carreira Internacional">
      <div class="top-r">
        <span class="live">AO VIVO</span>
        <div class="presets" id="presets">
          <button class="preset" data-d="1" onclick="setPreset(this)">Ontem</button>
          <button class="preset" data-d="3" onclick="setPreset(this)">3 dias</button>
          <button class="preset" data-d="7" onclick="setPreset(this)">7 dias</button>
          <button class="preset" data-d="14" onclick="setPreset(this)">14 dias</button>
          <button class="preset active" data-d="all" onclick="setPreset(this)">Tudo</button>
        </div>
        <div class="dates">
          <span class="dlbl">De</span><input type="date" id="dDe" onchange="setDates()">
          <span class="dlbl">até</span><input type="date" id="dAte" onchange="setDates()">
          <button class="dclear" id="dClear" onclick="clearDates()" style="display:none">✕</button>
        </div>
        <button class="btn" onclick="loadAll()">↻ Atualizar</button>
        <div class="updated" id="updated"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-p="geral" onclick="setTab(this)">Geral</button>
      <button class="tab" data-p="malu" onclick="setTab(this)">Malu</button>
      <button class="tab" data-p="hire" onclick="setTab(this)">Hire</button>
      <button class="tab" data-p="campanhas" onclick="setTab(this)">Campanhas</button>
      <button class="tab" data-p="publicos" onclick="setTab(this)">Públicos</button>
      <button class="tab" data-p="criativos" onclick="setTab(this)">Criativos</button>
      <button class="tab" data-p="lp" onclick="setTab(this)">LP</button>
    </div>

    <div id="body"><div class="loading">Carregando dados da planilha…</div></div>
    <div class="foot" id="foot">Atualiza automaticamente a cada abertura · dados de 13/07 até o dia anterior (o dia atual entra só quando as vendas são lançadas)</div>
  </div>

  <script>
    // ── Config ───────────────────────────────────────────────────────────────
    const SHEET_WICI = '1DnIF0UDbdpZ7wV09dEjIkYP8G4H47Tzi7PXOKES5gkI';
    const UTM_MALU   = '1J9USJNVbFsIuih8j_vD5zsG_iP7P_jvp8BGcxldVw9M';
    const UTM_HIRE   = '1RKBwlAGJWFZ72Us4GHU_sron19JY8XuFWRvBOtH0YDA';
    const SHEET_METR = '1V4WEVo5A0TYZ5_1Ez4rb_RHXwd6ExneizW38hzS8YZE';   // aba MÉTRICAS (compradores/vendas)
    const START = new Date(2026, 6, 13);          // 13/07/2026 — início do TRÁFEGO (usado no pacing)
    // Piso do filtro. NÃO usar START aqui: a planilha MÉTRICAS começa em 10/07 (o
    // orgânico é mais antigo que o tráfego), e cortar em 13/07 derrubaria o
    // orgânico de 106 pra 44 no modo "Tudo".
    const FLOOR = new Date(2026, 0, 1);
    const EVENT = new Date(2026, 7, 15);          // 15/08/2026 (evento) — p/ meta/dia
    const METAS_DEFAULT = { leads:1170, investimento:87750, cpa:71, cpm:25, ctr:0.80, connect_rate:82,
      cotacao:5.16, data_inicio:'13/07/2026', data_evento:'15/08 e 16/08' };

    let DATA = { malu:[], hire:[], umalu:[], uhire:[], metas:{...METAS_DEFAULT}, metricas:null };
    let profile = 'geral', presetDays = 'all';

    const BRL = v => (v==null||isNaN(v)) ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    const BRLk= v => (v==null||isNaN(v)) ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
    const NUM = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});
    const PCT = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}) + '%';
    const RS  = v => (v==null||isNaN(v)) ? '—' : Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) + 'x';
    const div = (a,b) => b ? a/b : 0;
    const dkey = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

    function parseBR(s){
      if(s==null) return 0; if(typeof s==='number') return s;
      s=String(s).replace(/R\$/g,'').replace(/%/g,'').replace(/ /g,'').trim();
      if(!s) return 0; s=s.replace(/\./g,'').replace(',','.');
      const n=parseFloat(s); return isNaN(n)?0:n;
    }

    // ── gviz JSONP ────────────────────────────────────────────────────────────
    let _seq=0;
    function gviz(sheetId, query){
      return new Promise((resolve,reject)=>{
        const cb='__gv_'+(++_seq)+'_'+Date.now();
        const s=document.createElement('script');
        const done=()=>{ try{delete window[cb];}catch(e){} if(s.parentNode)s.parentNode.removeChild(s); clearTimeout(tm); };
        const tm=setTimeout(()=>{done();reject(new Error('timeout'));},25000);
        window[cb]=r=>{ done(); (r&&r.table)?resolve(r.table):reject(new Error('vazio')); };
        s.onerror=()=>{done();reject(new Error('rede'));};
        s.src='https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?'+query+'&tqx=responseHandler:'+cb;
        document.head.appendChild(s);
      });
    }
    const cNum = c => !c ? 0 : (typeof c.v==='number' ? c.v : parseBR(c.f!=null?c.f:c.v));
    const cStr = c => !c ? '' : (c.f!=null?c.f:(c.v!=null?String(c.v):''));
    const cDate= c => {
      if(!c) return null;
      const f=String(c.f||c.v||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
      if(f){ let y=+f[3]; if(y<100)y+=2000; return new Date(y,+f[2]-1,+f[1]); }
      const d=String(c.v||'').match(/Date\((\d+),(\d+),(\d+)/); if(d) return new Date(+d[1],+d[2],+d[3]);
      return null;
    };

    function metaRows(table){
      const out=[];
      for(const r of (table.rows||[])){
        const c=r.c||[]; const d=cDate(c[0]); if(!d||d<START) continue;
        out.push({ date:d, campanha:cStr(c[1]), adset:cStr(c[2]), cost:cNum(c[3]), impressions:cNum(c[4]), reach:cNum(c[5]),
          clicks:cNum(c[6]), pageview:cNum(c[7]), ic:cNum(c[8]), compras:cNum(c[9]),
          link:cStr(c[10]), anuncio:cStr(c[11]), faturamento:cNum(c[12]), status:cStr(c[13]) });
      }
      return out;
    }
    function utmRows(table){
      // Date, Email, utm_source, utm_campaign, utm_medium, utm_content, utm_term
      const out=[];
      for(const r of (table.rows||[])){
        const c=r.c||[]; const d=cDate(c[0]); if(!d||d<START) continue;
        out.push({ date:d, source:cStr(c[2])||'—', campaign:cStr(c[3])||'—',
          content:cStr(c[5])||'—', term:cStr(c[6])||'—' });
      }
      return out;
    }
    function readMetas(table){
      const rows=[];
      if(table.cols&&table.cols.length) rows.push(table.cols.map(c=>c.label!=null?c.label:(c.id||'')));
      for(const r of (table.rows||[])) rows.push((r.c||[]).map(c=>c?(c.f!=null?c.f:(c.v!=null?String(c.v):'')):''));
      const m={...METAS_DEFAULT};
      for(const r of rows){
        const k=(r[0]||'').toString().trim().toLowerCase(); const v=r[1]!=null?r[1]:'';
        if(k.includes('leads')){ if(parseBR(v))m.leads=parseBR(v); }
        else if(k.includes('investimento')){ if(parseBR(v))m.investimento=parseBR(v); if(r[4])m.data_inicio=String(r[4]).trim(); if(r[8])m.data_evento=String(r[8]).trim(); }
        else if(k==='cpa'){ if(parseBR(v))m.cpa=parseBR(v); }
        else if(k==='cpm'){ if(parseBR(v))m.cpm=parseBR(v); }
        else if(k==='ctr'){ if(parseBR(v))m.ctr=parseBR(v); }
        else if(k.includes('connect')){ if(parseBR(v))m.connect_rate=parseBR(v); }
        else if(k.includes('cotac')||k.includes('dolar')||k.includes('dólar')||k.includes('cambio')||k.includes('câmbio')||k==='usd'){ if(parseBR(v))m.cotacao=parseBR(v); }
      }
      return m;
    }

    // aba MÉTRICAS: DATA,WA_START,WA_VIP,VENDAS_ORG,PACE_DIA,PACE_MED,FALTA,%META,START_ORG,VIP_ORG,START_ADS,VIP_ADS,TOTAL
    function metricasParse(table){
      const rows=table.rows||[]; let latest=null; const series=[]; let dias=0;
      for(const r of rows){
        const c=r.c||[]; const d=cDate(c[0]); if(!d) continue;
        const org=cNum(c[3]), total=cNum(c[12]), has=(org>0||total>0);
        // Todas as colunas abaixo são ACUMULADAS na planilha — viram valor/dia via
        // cumDaily(), que é o que deixa o filtro de data funcionar em cima delas.
        series.push({ date:d, org, paceDia:cNum(c[4]), total,
          ads:cNum(c[10])+cNum(c[11]), startAds:cNum(c[10]), vipAds:cNum(c[11]),
          startOrg:cNum(c[8]), vipOrg:cNum(c[9]), waStart:cNum(c[1]), waVip:cNum(c[2]),
          // Popups de ADS por página (START+VIP) — base pra dividir a venda na LP.
          pMaluB:cNum(c[18])+cNum(c[19]), pMaluC:cNum(c[20])+cNum(c[21]),
          pHireC:cNum(c[26])+cNum(c[27]), pHireD:cNum(c[28])+cNum(c[29]), hasData:has });
        if(has){ dias++;
          latest={ data:d, whatsapp_start:cNum(c[1]), whatsapp_vip:cNum(c[2]),
            vendas_org:org, pace_diario:cNum(c[4]), pace_medio:cNum(c[5]), falta_meta:cNum(c[6]), pct_meta:parseBR(cStr(c[7])),
            start_org:cNum(c[8]), vip_org:cNum(c[9]), start_ads:cNum(c[10]), vip_ads:cNum(c[11]), total };
        }
      }
      // "FALTA PARA META" na planilha é calculado só sobre as vendas ORGÂNICAS (a
      // coluna nasceu antes do tráfego existir) → meta real = falta + org = 1.800.
      // Somar com o TOTAL daria 1.850, inflando a meta conforme o ads vende.
      if(latest){ latest.meta = latest.falta_meta + latest.vendas_org; latest.dias = dias || 1;
        latest.vendas_ads = latest.start_ads + latest.vip_ads; }
      return { latest, series };
    }

    // ── Vendas ADS: a planilha MÉTRICAS é a fonte de verdade ───────────────────
    // O Meta sub-reporta compras (pixel/contas novas): hoje reporta ~24 contra 50
    // na planilha. Então o TOTAL vem da planilha (START ADS + VIP ADS, acumulado)
    // e as vendas por campanha/criativo/público são redistribuídas proporcional ao
    // que o Meta reportou, com método do maior resto — inteiros que somam exato.

    // As colunas da planilha são ACUMULADAS. Aqui viram valor por dia (diferença
    // do acumulado), o que é o que permite o filtro de data funcionar em cima
    // delas. Ignora linhas futuras vazias — senão o acumulado "cairia" pra zero e
    // geraria incremento negativo.
    function cumDaily(key){
      const s=((DATA.metricas&&DATA.metricas.series)||[]).filter(r=>r.hasData);
      const out={}; let prev=0;
      for(const r of s){ const inc=r[key]-prev; prev=r[key]; if(inc>0) out[dkey(r.date)]=inc; }
      return out;
    }
    // Soma os valores diários que caem dentro do filtro de data.
    function cumInRange(key){
      const d=cumDaily(key); let t=0;
      for(const k in d){ const p=k.split('-'); if(inRange(new Date(+p[0],+p[1]-1,+p[2]))) t+=d[k]; }
      return t;
    }
    const adsDaily  = () => cumDaily('ads');     // vendas ads por dia
    const adsTarget = () => cumInRange('ads');   // vendas ads no período filtrado
    // Vendas do recorte atual segundo a planilha — ela é quem manda. O Meta só
    // serve pra RATEAR esse total entre perfis/campanhas/criativos.
    // null = não há planilha carregada → usa o número do Meta como está.
    function viewTarget(rows){
      if(!(DATA.metricas && DATA.metricas.latest)) return null;
      const t=adsTarget();
      if(t<=0) return 0;      // planilha diz que não houve venda no período: é 0, não o do Meta
      let allC=0, allI=0, c=0, i=0;
      for(const r of DATA.malu.concat(DATA.hire)) if(inRange(r.date)){ allC+=r.compras; allI+=r.cost; }
      for(const r of rows){ c+=r.compras; i+=r.cost; }
      // Rateio pelas compras do Meta; se o Meta não reportou nenhuma compra no
      // período, rateia pelo investido — senão as vendas reais sumiriam da tela.
      const share = allC>0 ? c/allC : (allI>0 ? i/allI : 0);
      return Math.round(t*share);
    }
    // Distribui `target` entre os grupos proporcional a `raw`, mantendo inteiros
    // que somam exatamente `target` (maior resto).
    function distribute(raw, target){
      const out=raw.map(()=>0);
      const tot=raw.reduce((a,b)=>a+b,0);
      if(!(target>0) || tot<=0) return out;
      const exact=raw.map(v=>v/tot*target);
      let acc=0; exact.forEach((v,i)=>{ out[i]=Math.floor(v); acc+=out[i]; });
      const ord=exact.map((v,i)=>({i,f:v-Math.floor(v)})).sort((a,b)=>b.f-a.f);
      const rest=target-acc;
      for(let k=0; k<rest && ord.length; k++) out[ord[k%ord.length].i]++;
      return out;
    }
    // Vendas ajustadas por grupo — somam exatamente o total da planilha do recorte.
    // Peso: compras do Meta. Se o Meta zerou tudo no período, cai pro investido —
    // senão a tabela mostraria 0 em toda linha com o total dizendo N.
    function vendasAdj(raw, rows, peso){
      const t=viewTarget(rows);
      if(t==null) return raw;
      const base = raw.some(v=>v>0) ? raw : ((peso && peso.some(v=>v>0)) ? peso : raw);
      return distribute(base, t);
    }
    // Vendas Ads por dia de um subconjunto de linhas: pega o número real do dia
    // (planilha) e rateia proporcional às compras que o Meta deu pra esse
    // subconjunto. Passando todas as linhas, devolve o número da planilha intacto.
    function adsByDay(rows){
      const d=adsDaily(), allD={}, subD={}, out={};
      for(const r of DATA.malu.concat(DATA.hire)) if(inRange(r.date)){ const kd=dkey(r.date); allD[kd]=(allD[kd]||0)+r.compras; }
      for(const r of rows){ const kd=dkey(r.date); subD[kd]=(subD[kd]||0)+r.compras; }
      for(const kd in d){ const p=kd.split('-');
        if(!inRange(new Date(+p[0],+p[1]-1,+p[2]))) continue;
        const a=allD[kd]||0;
        out[kd] = a>0 ? Math.round(d[kd]*(subD[kd]||0)/a) : 0;
      }
      return out;
    }

    // ── Filtro de data ─────────────────────────────────────────────────────────
    // Vale pra dash toda porque TUDO (Meta, UTMs e as colunas da planilha) passa
    // por inRange. Preset e De/Até são exclusivos: usar um limpa o outro.
    let fStart=null, fEnd=null;          // null = sem limite daquele lado
    function cutoff(){
      if(presetDays==='all') return FLOOR;
      const t=new Date(); t.setHours(0,0,0,0);
      const c=new Date(t); c.setDate(c.getDate()-Number(presetDays));
      return c<FLOOR?FLOOR:c;
    }
    // Teto = ONTEM. Nunca mostra o dia atual, porque o gasto do dia já entra no
    // Meta mas a venda ainda não foi lançada na planilha MÉTRICAS — o que fazia o
    // CPA de hoje estourar (gasto ÷ 0 venda). Máximo visível: D-1.
    function ontem(){ const y=new Date(); y.setHours(0,0,0,0); y.setDate(y.getDate()-1); return y; }
    const inRange = d => {
      if(d>ontem()) return false;
      if(fStart && d<fStart) return false;
      if(fEnd   && d>fEnd)   return false;
      return d>=cutoff();
    };

    // ── Aggregation ─────────────────────────────────────────────────────────────
    function metaAgg(rows){
      let cost=0,imp=0,reach=0,clk=0,pv=0,ic=0,comp=0,fat=0;
      for(const r of rows){ cost+=r.cost;imp+=r.impressions;reach+=r.reach;clk+=r.clicks;pv+=r.pageview;ic+=r.ic;comp+=r.compras;fat+=r.faturamento; }
      // Vendas vêm da planilha (o Meta sub-reporta). Ajustado aqui, na raiz, pra
      // CPA/ticket/tx de conversão saírem certos em TODAS as abas de uma vez.
      const t=viewTarget(rows); if(t!=null) comp=t;
      return { investido:cost, impressoes:imp, alcance:reach, cliques:clk, pageviews:pv, initiate_checkout:ic, vendas:comp, faturamento:fat,
        ctr:div(clk,imp)*100, cpm:div(cost,imp)*1000, cpc:div(cost,clk), cpa:div(cost,comp), roas:div(fat,cost), ticket:div(fat,comp), connect_rate:div(pv,clk)*100 };
    }
    function topBy(rows, field, n){
      const by={}; for(const r of rows){ const k=r[field]||'—'; by[k]=(by[k]||0)+1; }
      return Object.entries(by).map(([label,count])=>({label,count})).sort((a,b)=>b.count-a.count).slice(0,n);
    }
    function anuncios(rows){
      const by={};
      for(const r of rows){ const key=r.anuncio||r.campanha||'(sem nome)'; let o=by[key];
        if(!o) o=by[key]={nome:key,link:r.link,cost:0,impressions:0,clicks:0,ic:0,raw:0,faturamento:0,status:'',_sd:null,_rk:9};
        o.cost+=r.cost;o.impressions+=r.impressions;o.clicks+=r.clicks;o.ic+=r.ic;o.raw+=r.compras;o.faturamento+=r.faturamento;
        if(!o.link&&r.link)o.link=r.link;
        accStatus(o,r);
      }
      const list=Object.values(by);
      const vend=vendasAdj(list.map(o=>o.raw), rows, list.map(o=>o.cost));   // soma = total da planilha
      return list.map((o,i)=>({nome:o.nome,link:o.link,status:o.status,investido:o.cost,impressoes:o.impressions,cliques:o.clicks,
        initiate_checkout:o.ic,vendas:vend[i],faturamento:o.faturamento,cpa:div(o.cost,vend[i]),roas:div(o.faturamento,o.cost),ctr:div(o.clicks,o.impressions)*100}))
        .sort((a,b)=>b.investido-a.investido);
    }

    // ── Render ──────────────────────────────────────────────────────────────────
    const ARC=298.5;
    function gauge(id, title, atual, meta, fmt, mediaDia, metaDia, pace, sub){
      const pct = meta? Math.min(100,Math.max(0,atual/meta*100)) : 0;
      return `<div class="gauge-card"><div class="gauge-title">${title}</div>
        ${sub?`<div class="gauge-sub">${sub}</div>`:''}
        <div class="gauge-wrap"><svg class="gauge-svg" viewBox="0 0 200 140">
          <path class="gauge-track" d="M5,110 A95,95,0,0,1,195,110"/>
          <path class="gauge-fill" d="M5,110 A95,95,0,0,1,195,110" stroke="url(#pg)"
            stroke-dasharray="${ARC} ${ARC}" stroke-dashoffset="${ARC*(1-pct/100)}"/>
          <defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5a1e68"/><stop offset="100%" stop-color="#a855c8"/></linearGradient></defs>
          <text x="5" y="132" class="gauge-leg" text-anchor="middle" fill="rgba(255,255,255,.7)">${fmt(atual)}</text>
          <text x="195" y="132" class="gauge-leg" text-anchor="middle" fill="rgba(255,255,255,.35)">${meta?fmt(meta):'—'}</text>
        </svg><div class="gauge-pct">${pct.toLocaleString('pt-BR',{maximumFractionDigits:1})}%</div></div>
        <div class="gauge-stats">
          <div class="gauge-stat"><div class="gauge-stat-l">Média/dia</div><div class="gauge-stat-v">${mediaDia}</div></div>
          <div class="gauge-stat"><div class="gauge-stat-l">Meta/dia</div><div class="gauge-stat-v">${metaDia}</div></div>
          ${pace?`<div class="gauge-stat"><div class="gauge-stat-l">Precisa/dia</div><div class="gauge-stat-v ${pace.cls}" title="${pace.tip}">${pace.txt}</div></div>`:''}
        </div></div>`;
    }
    function card(k,v,cls,prev,tax){ return `<div class="card ${cls&&cls.includes('hl')?'hl':''}"><div class="k">${k}</div>${prev?`<div class="prev">${prev}</div>`:''}<div class="v ${cls||''}">${v}</div>${tax?`<div class="tax">${tax}</div>`:''}</div>`; }

    let charts=[];
    function killCharts(){ charts.forEach(c=>{try{c.destroy();}catch(e){}}); charts=[]; }

    function render(){
      killCharts();
      const mrows = (profile==='malu'?DATA.malu:profile==='hire'?DATA.hire:DATA.malu.concat(DATA.hire)).filter(r=>inRange(r.date));
      const urows = (profile==='malu'?DATA.umalu:profile==='hire'?DATA.uhire:DATA.umalu.concat(DATA.uhire)).filter(r=>inRange(r.date));
      const k=metaAgg(mrows), m=DATA.metas;
      const leads=urows.length;

      // dias
      const today=new Date(); today.setHours(0,0,0,0);
      const daysElapsed=Math.max(1, Math.round((today-START)/864e5)+1);
      const daysTotal=Math.max(1, Math.round((EVENT-START)/864e5)+1);
      const cpl=div(k.investido,leads);

      const mc = DATA.metricas && DATA.metricas.latest;
      const metaIng  = mc ? mc.meta : 1800;              // meta total de ingressos
      const metaTraf = m.leads || 1170;                  // "Trafego meta leads" (aba Metas)
      const metaOrg  = Math.max(0, metaIng - metaTraf);  // 1.800 − 1.170 = 630
      // Orgânico e total somam os valores DIÁRIOS dentro do filtro (antes liam o
      // acumulado da última linha e ignoravam o período escolhido).
      const orgSales = mc ? cumInRange('org') : 0;
      const vAds = k.vendas;                             // metaAgg já traz o da planilha
      const ingressos = mc ? orgSales + adsTarget() : k.vendas;
      // Média/dia: cada métrica divide pelos dias que ELA rodou, dentro do filtro.
      // O tráfego começou em 13/07 e o orgânico em 10/07 — dividir os dois pelos
      // mesmos dias subestimaria o ads (diluiria por dias em que ele nem existia).
      const _ser  = ((DATA.metricas&&DATA.metricas.series)||[]).filter(s=>s.hasData && inRange(s.date));
      const ddTot = Math.max(1, _ser.length);                     // dias com dado
      const ddAds = Math.max(1, _ser.filter(s=>s.ads>0).length);  // dias com tráfego
      // Pace real: quanto FALTA ÷ dias que restam até o evento. A "meta/dia" é o
      // ritmo teórico calculado desde o dia 1 e não se corrige conforme atrasamos;
      // este é o número acionável — o ritmo necessário de amanhã em diante.
      const diasRest=Math.max(1, Math.round((EVENT-today)/864e5));
      function paceOf(atual, meta, ritmoAtual, f, okTxt){
        if(!meta) return null;
        f = f || NUM;
        const falta=meta-atual;
        if(falta<=0) return { txt:okTxt||'✓ meta batida', cls:'pc-ok', tip:'Meta atingida' };
        const need=Math.ceil(falta/diasRest);
        // Verde quando o ritmo já alcançado dá conta; vermelho quando é preciso acelerar.
        const cls = ritmoAtual>=need ? 'pc-ok' : 'pc-bad';
        return { txt:f(need), cls,
          tip:f(falta)+' restantes ÷ '+diasRest+' dias até 15/08 · ritmo atual '+f(ritmoAtual)+'/dia' };
      }
      const rAds=Math.round(vAds/ddAds), rOrg=Math.round(orgSales/ddTot), rTot=Math.round(ingressos/ddTot);
      // Investimento: dias decorridos desde o início do TRÁFEGO (o gasto começou lá),
      // não desde o início da planilha — senão a média/dia sai diluída.
      const rInv=k.investido/Math.max(1,ddAds);
      const _disp=Math.max(0, m.investimento-k.investido);
      let h='';
      h+=`<div class="gauges">`;
      h+=gauge('g1','Vendas Tráfego', vAds, metaTraf, NUM, NUM(rAds), NUM(Math.round(metaTraf/daysTotal)), paceOf(vAds,metaTraf,rAds));
      h+=gauge('g2','Vendas Orgânico', orgSales, metaOrg, NUM, NUM(rOrg), NUM(Math.round(metaOrg/daysTotal)), paceOf(orgSales,metaOrg,rOrg));
      h+=gauge('g3','Total Geral', ingressos, metaIng, NUM, NUM(rTot), NUM(Math.round(metaIng/daysTotal)), paceOf(ingressos,metaIng,rTot));
      h+=gauge('g4','Investimento', k.investido, m.investimento, BRLk, BRLk(rInv), BRLk(m.investimento/daysTotal),
             paceOf(k.investido, m.investimento, rInv, BRLk, '✓ verba usada'), 'Disponível: '+BRLk(_disp));
      h+=`</div>`;

      // ── 1) Tráfego · Ads (Meta Ads) ──
      h+=`<div class="lbl">Tráfego · Ads (Meta Ads)</div><div class="grid">`;
      h+=card('Investimento Total', BRL(k.investido), 'hl v', 'Previsto: '+BRLk(m.investimento), 'Taxa investida '+PCT(div(k.investido,m.investimento)*100))
        +card('Vendas Ads', NUM(vAds), 'accent', mc?'Fonte: planilha':'')
        +(mc?card('START ADS', NUM(cumInRange('startAds'))):'')
        +(mc?card('VIP ADS', NUM(cumInRange('vipAds'))):'')
        +card('CPA', vAds>0?BRL(k.cpa):'—')   // sem venda: '—', senão R$0,00 lê como CPA ótimo
        +card('CTR', PCT(k.ctr));
      h+=`</div>`;

      // ── 2) Vendas Orgânicas ──
      if(mc){
        h+=`<div class="lbl">Vendas Orgânicas</div><div class="grid">`;
        // % da meta calculado sobre os ingressos mostrados. O "% META" da planilha
        // considera só o orgânico, então dava 5,89% ao lado de um total de 156.
        h+=card('Ingressos Vendidos', NUM(ingressos), 'hl v', 'Meta: '+NUM(metaIng), PCT(div(ingressos,metaIng)*100)+' da meta')
          +card('Vendas Workshop ORG', NUM(orgSales), 'accent')
          +card('START ORG', NUM(cumInRange('startOrg')))
          +card('VIP ORG', NUM(cumInRange('vipOrg')))
          +card('Grupo WhatsApp START', NUM(cumInRange('waStart')))
          +card('Grupo WhatsApp VIP', NUM(cumInRange('waVip')));
        h+=`</div>`;
      }

      // ── 3) Gráfico por dia (largura total) ──
      h+=`<div class="lbl">Vendas por Dia — Orgânico × Ads + Investimento e CPA</div>
        <div class="chart-card"><div class="chart-box tall"><canvas id="cDia"></canvas></div></div>`;

      // ── 4) Origem dos cadastros (UTMs) — 3 colunas ──
      h+=`<div class="lbl">Origem dos Cadastros (UTMs)</div><div class="charts3">
        <div class="chart-card"><div class="chart-title">Origem</div><div class="chart-box tall"><canvas id="cOrig"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Top Anúncios</div><div class="chart-box tall"><canvas id="cAds"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Públicos</div><div class="chart-box tall"><canvas id="cPub"></canvas></div></div>
      </div>`;

      document.getElementById('body').innerHTML=h;
      document.getElementById('updated').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const footEl=document.getElementById('foot'); if(footEl) footEl.textContent='Atualiza a cada abertura · dados de 13/07 em diante · investimento convertido a R$ '+(m.cotacao||5.16).toLocaleString('pt-BR',{minimumFractionDigits:2})+'/US$';

      // Charts — vendas Orgânico (verde) + Ads (roxo) empilhadas + investido/dia (linha). Só dias com dado.
      const invByDay={};
      for(const r of mrows){ const kd=dkey(r.date); invByDay[kd]=(invByDay[kd]||0)+r.cost; }
      // Vendas Ads/dia: número real da planilha, rateado pro perfil selecionado.
      const pagoByDay = adsByDay(mrows);
      const orgByDay={}; ((DATA.metricas&&DATA.metricas.series)||[]).forEach(s=>{ const v=Math.max(0, s.paceDia||0); if(v>0) orgByDay[dkey(s.date)]=v; });
      const _dset=new Set([...Object.keys(invByDay).filter(k=>invByDay[k]>0||pagoByDay[k]>0), ...Object.keys(orgByDay)]);
      const _dates=[..._dset].sort();
      const dlabels=_dates.map(k=>{const p=k.split('-');return p[2]+'/'+p[1];});
      charts.push(new Chart(document.getElementById('cDia'),{
        data:{ labels:dlabels, datasets:[
          { type:'bar', label:'Vendas Orgânicas', data:_dates.map(k=>orgByDay[k]||0), backgroundColor:'#4ade80cc', borderColor:'#4ade80', borderWidth:0, borderRadius:4, stack:'v', yAxisID:'y' },
          { type:'bar', label:'Vendas Ads', data:_dates.map(k=>pagoByDay[k]||0), backgroundColor:'#b565d6cc', borderRadius:4, stack:'v', yAxisID:'y' },
          { type:'line', label:'Investido/dia', data:_dates.map(k=>invByDay[k]||0), borderColor:'#e6ccf5', backgroundColor:'rgba(230,204,245,.12)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#e6ccf5', tension:.35, yAxisID:'y1' },
          // CPA/dia = investido ÷ vendas ads do dia. Eixo próprio: o CPA (~R$80) é
          // uma ordem de grandeza menor que o investido (~R$1.800) e sumiria no y1.
          // null nos dias sem venda (não desenha ponto em vez de fingir CPA 0).
          { type:'line', label:'CPA/dia', data:_dates.map(k=>{ const v=pagoByDay[k]||0; return v>0?+((invByDay[k]||0)/v).toFixed(2):null; }),
            borderColor:'#fbbf24', backgroundColor:'transparent', borderWidth:2, borderDash:[5,4], pointRadius:3, pointBackgroundColor:'#fbbf24', tension:.35, spanGaps:true, yAxisID:'y2' },
        ]},
        options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
          plugins:{ legend:{labels:{color:'#cbb8dd',boxWidth:14,font:{size:12}}},
            tooltip:{callbacks:{label:c=>{ const l=c.dataset.label;
              return (l.indexOf('Investido')>=0||l.indexOf('CPA')>=0) ? ` ${l}: `+BRL(c.parsed.y) : ` ${l}: ${c.parsed.y}`; }}} },
          scales:{ x:{stacked:true,grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0',font:{size:11}}}, y:{stacked:true,grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0'},beginAtZero:true},
            y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#e6ccf5',callback:v=>'R$'+Math.round(v)},beginAtZero:true},

    // ── Ordenação de tabelas (clicar no cabeçalho) ──────────────────────────────
    let _sortState={};
    function doSort(tab,key){ const st=_sortState[tab]||(_sortState[tab]={key:key,dir:-1}); if(st.key===key) st.dir=-st.dir; else { st.key=key; st.dir=-1; } route(); }
    function sortRows(tab, rows, defKey){
      const st=_sortState[tab]||(_sortState[tab]={key:defKey,dir:-1});
      return rows.slice().sort((a,b)=>{ let va=a[st.key], vb=b[st.key];
        if(va==null||va==='')va=-Infinity; if(vb==null||vb==='')vb=-Infinity;
        if(typeof va==='number'&&typeof vb==='number') return (va-vb)*st.dir;
        return String(va).localeCompare(String(vb),'pt')*st.dir; });
    }
    function sortTh(tab,key,label,left){ const st=_sortState[tab]||{}; const ar=st.key===key?(st.dir<0?' ↓':' ↑'):''; return `<th class="sortable" onclick="doSort('${tab}','${key}')"${left?' style="text-align:left"':''}>${label}${ar}</th>`; }

    // ── Campanhas / Públicos / Criativos ────────────────────────────────────────
    function campType(name){ if(/_Q(\b|_)|\[Q\]|QUENTE|RMKT|REMARK/i.test(name)) return 'quente'; if(/_F(\b|_)|\[F\]|\bFRIO\b/i.test(name)) return 'frio'; return '—'; }

    // Status efetivo do Meta → selo. ACTIVE=ativo; qualquer *PAUSED=pausado;
    // DISAPPROVED=reprovado. rank ordena (ativo primeiro). Usado pra pegar o
    // estado mais "ativo" na data mais recente de cada grupo.
    function statusInfo(raw){
      const s=String(raw||'').toUpperCase();
      if(s==='ACTIVE')      return { txt:'Ativo',     cls:'st-on',   rank:0 };
      if(s==='DISAPPROVED') return { txt:'Reprovado', cls:'st-bad',  rank:2 };
      if(s.indexOf('PAUSED')>=0) return { txt:'Pausado', cls:'st-off', rank:1 };
      return { txt:'—', cls:'st-none', rank:3 };
    }
    // Acumula, num objeto de grupo, o status mais recente/ativo (min rank na maior data).
    function accStatus(o, r){
      if(!r.status) return;
      const rk=statusInfo(r.status).rank;
      if(!o._sd || r.date>o._sd){ o._sd=r.date; o.status=r.status; o._rk=rk; }
      else if(o._sd && r.date.getTime()===o._sd.getTime() && rk<o._rk){ o.status=r.status; o._rk=rk; }
    }
    const stBadge = raw => { const s=statusInfo(raw); return `<span class="st ${s.cls}">${s.txt}</span>`; };
    const stKey = raw => statusInfo(raw).cls.slice(3);   // 'on'|'off'|'bad'|'none'

    // Regra: a letra da página é a que sobra DEPOIS do marcador de temperatura,
    // no FIM do nome. Sem letra sobrando → página C (foi a primeira, criada antes
    // da convenção existir). Ex.: _Vendas_F → C · _Vendas_F_D → D · _Vendas_Q → C
    // CUIDADO: _F e _Q são frio/quente, NÃO páginas — daí o descarte explícito.
    function campPage(nome){
      const m=String(nome||'').trim().match(/[_\-\s]([A-Za-z])\s*$/);
      if(!m) return 'C';
      const L=m[1].toUpperCase();
      if(L==='F'||L==='Q') return 'C';

    // LP: Malu (malu-ads-c) = campanhas [MALU]; Hire (hire-ads-c) = [HIRE]. Funil por LP (estilo WICI2).
    function lpAgg(rows, vdOverride){
      let cost=0,imp=0,clk=0,pv=0,ic=0,vd=0;
      for(const r of rows){ cost+=r.cost;imp+=r.impressions;clk+=r.clicks;pv+=r.pageview;ic+=r.ic;vd+=r.compras; }
      if(vdOverride!=null) vd=vdOverride;            // vendas por página (regra da LP)
      else { const t=viewTarget(rows); if(t!=null) vd=t; }   // total: planilha
      return { investido:cost, imp, cliques:clk, pv, ic, vendas:vd, ctr:div(clk,imp)*100, connect:div(pv,clk)*100,
        tx_checkout:div(ic,pv)*100, tx_venda:div(vd,ic)*100, conv:div(vd,clk)*100, cpa:div(cost,vd) };
    }
    // Vendas por página. Base = POPUPS de ads por página (colunas da planilha
    // MÉTRICAS), que é a distribuição real. A página C de cada perfil absorve a
    // diferença até o total do perfil (planilha). A Malu A não tem coluna de popup
    // → o peso dela vem direto da fonte de dados (compras do Meta).
    function pageVendas(lps){
      const out={};
      const W={ 'LP Malu B':cumInRange('pMaluB'), 'LP Malu C':cumInRange('pMaluC'),
                'LP Hire C':cumInRange('pHireC'), 'LP Hire D':cumInRange('pHireD') };
      // Peso = popup da página. Página SEM coluna de popup (ex.: Malu A) → peso 0,
      // ou seja 0 vendas: sem popup preenchido não há conversão rastreada nela, e a
      // diferença vai pra C. (A cliente confirmou que a A não tem popup — os anúncios
      // que estavam como _A foram renomeados pra _B.)
      const peso=lp=>(W[lp.nome]!=null) ? W[lp.nome] : 0;
      for(const perfil of ['Malu','Hire']){
        const pref='LP '+perfil+' ';
        const pages=lps.filter(l=>l.nome.indexOf(pref)===0);
        const prows=(perfil==='Malu'?DATA.malu:DATA.hire).filter(r=>inRange(r.date));
        const target=viewTarget(prows);
        if(target==null){ for(const lp of pages) out[lp.nome]=lp.rows.reduce((s,r)=>s+r.compras,0); continue; }
        const Wsum=pages.reduce((s,lp)=>s+peso(lp),0)||1;
        let nonC=0;
        for(const lp of pages){ if(lp.nome.slice(pref.length)!=='C'){
          const prop=Math.round(Math.round(target)*peso(lp)/Wsum);
          const chk=lp.rows.reduce((s,r)=>s+r.ic,0);          // checkout da página
          const v=Math.min(prop, chk);                         // venda nunca passa do checkout
          out[lp.nome]=v; nonC+=v; } }
        // C absorve o resto (a diferença + o excesso que não coube nas outras).
        for(const lp of pages){ if(lp.nome.slice(pref.length)==='C') out[lp.nome]=Math.max(0, Math.round(target)-nonC); }
      }
      return out;
    }
    function lpDaily(rows){
      const map={}, adsD=adsByDay(rows);
      for(const r of rows){ const k=dkey(r.date); const o=map[k]||(map[k]={clk:0,pv:0,ic:0,vd:0,imp:0}); o.clk+=r.clicks;o.pv+=r.pageview;o.ic+=r.ic;o.imp+=r.impressions; }
      for(const k in map) map[k].vd = adsD[k]||0;   // vendas/dia da planilha
      const keys=Object.keys(map).sort();
      return { labels:keys.map(k=>{const p=k.split('-');return p[2]+'/'+p[1];}),
        connect:keys.map(k=>{const o=map[k];return o.clk?+(o.pv/o.clk*100).toFixed(2):null;}),
        checkout:keys.map(k=>{const o=map[k];return o.pv?+(o.ic/o.pv*100).toFixed(2):null;}),
        txconv:keys.map(k=>{const o=map[k];return o.ic?+(o.vd/o.ic*100).toFixed(2):null;}),
        txconvpv:keys.map(k=>{const o=map[k];return o.pv?+(o.vd/o.pv*100).toFixed(2):null;}) };
    }
    function lpLine(cid, labels, data, color){
      const el=document.getElementById(cid); if(!el) return;
      charts.push(new Chart(el,{ type:'line',
        data:{ labels, datasets:[{ data, borderColor:color, backgroundColor:color+'22', borderWidth:2, pointRadius:2, pointBackgroundColor:color, tension:.3, spanGaps:true, fill:true }] },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+PCT(c.parsed.y)}}},
          scales:{ x:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0',font:{size:9},maxTicksLimit:8}}, y:{grid:{color:'#ffffff08'},ticks:{color:'#9a8bb0',font:{size:9},callback:v=>Math.round(v)+'%'},beginAtZero:true} } }
      }));
    }
    function renderLP(){
      killCharts();
      // Uma LP por PÁGINA (não por perfil): a página vem do sufixo da campanha.
      // Só entra página que teve investimento no período — senão a tela enche de
      // funil vazio de página que ainda não subiu campanha.
      const _byPage={};
      for(const [perfil,src] of [['Malu',DATA.malu],['Hire',DATA.hire]]){
        for(const r of src){ if(!inRange(r.date)) continue;
          const pg=campPage(r.campanha), k=perfil+'|'+pg;
          (_byPage[k]=_byPage[k]||{nome:'LP '+perfil+' '+pg, url:lpUrl(perfil,pg), rows:[]}).rows.push(r);
        }
      }
      const lps=Object.keys(_byPage).sort()
        .map(k=>_byPage[k])
        .filter(l=>l.rows.some(r=>r.cost>0));
      if(!lps.length){ document.getElementById('body').innerHTML='<div class="empty">Sem dados no período</div>';
        document.getElementById('updated').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); return; }
      // Soma TODAS as páginas. Era lps[0]+lps[1] fixo (de quando só existiam Malu
      // e Hire) — com 3+ páginas isso silenciosamente deixava as demais de fora.
      const _allRows=lps.reduce((a,l)=>a.concat(l.rows),[]);
      const vendMap=pageVendas(lps);                              // venda por página
      const g=lpAgg(_allRows);
      g.vendas=Object.values(vendMap).reduce((a,b)=>a+b,0);       // GERAL = soma dos painéis
      g.cpa=div(g.investido,g.vendas);
      const _lbl='GERAL ('+lps.map(l=>l.nome.replace('LP ','')).join(' + ')+')';
      let h=`<div class="lp-geral"><div class="lp-geral-lbl">${_lbl}</div><div class="lp-geral-stats">
        <div><div class="lp-meta-lbl">Total Gasto</div><div class="lp-meta-val">${BRL(g.investido)}</div></div>
        <div><div class="lp-meta-lbl">CPA Médio</div><div class="lp-meta-val">${g.vendas>0?BRL(g.cpa):'—'}</div></div>
        <div><div class="lp-meta-lbl">Tx Conv PV→V</div><div class="lp-meta-val accent">${PCT(div(g.vendas,g.pv)*100)}</div></div>
        <div><div class="lp-meta-lbl">Total Vendas</div><div class="lp-meta-val">${NUM(g.vendas)}</div></div>
      </div></div><div class="lp-grid">`;
      const jobs=[];
      lps.forEach((lp,i)=>{ const a=lpAgg(lp.rows, vendMap[lp.nome]), d=lpDaily(lp.rows);
        const steps=[
          {n:'IMPRESSÕES', v:a.imp, wt:100, wb:86, rate:'CTR '+PCT(a.ctr)},
          {n:'CLIQUES NO LINK', v:a.cliques, wt:80, wb:66, rate:'CONNECT '+PCT(a.connect)},
          {n:'PAGE VIEW', v:a.pv, wt:60, wb:46, rate:'CHECKOUT '+PCT(a.tx_checkout)},
          {n:'CHECKOUT', v:a.ic, wt:40, wb:30, rate:'TX CONV '+PCT(a.tx_venda)},
          {n:'VENDAS ADS', v:a.vendas, wt:26, wb:20, rate:''},
        ];
        let fn='<div class="fn">';
        for(let si=0;si<steps.length;si++){ const s=steps[si]; const tl=(100-s.wt)/2,tr=(100+s.wt)/2,br=(100+s.wb)/2,bl=(100-s.wb)/2; const L=34+si*8;
          fn+=`<div class="fn-seg" style="clip-path:polygon(${tl}% 0,${tr}% 0,${br}% 100%,${bl}% 100%);background:linear-gradient(180deg,hsla(285,52%,${L}%,.92),hsla(285,52%,${L-7}%,.86))"><div class="fn-lbl">${s.n}</div><div class="fn-val">${NUM(s.v)}</div></div>`;
          if(s.rate) fn+=`<div class="fn-rate"><span class="fn-pill">${s.rate}</span></div>`;
        }
        fn+='</div>';
        h+=`<div class="lp-panel"><div class="lp-header"><div class="lp-header-left"><div class="lp-header-name">${lp.nome}</div><a class="lp-header-url" href="${lp.url}" target="_blank">${lp.url.replace('https://','')}</a></div>
          <div class="lp-header-right">
            <div><div class="lp-meta-lbl">Total Gasto</div><div class="lp-meta-val">${BRL(a.investido)}</div></div>
            <div><div class="lp-meta-lbl">CPA</div><div class="lp-meta-val">${a.vendas>0?BRL(a.cpa):'—'}</div></div>
            <div><div class="lp-meta-lbl">Tx Conv PV→V</div><div class="lp-meta-val accent">${PCT(div(a.vendas,a.pv)*100)}</div></div>
          </div></div>
          <div class="lp-body"><div class="lp-funnel-col">${fn}</div><div class="lp-charts-col">
            <div class="lp-chart-card"><div class="lp-chart-title">Connect Rate</div><div class="lp-chart-h"><canvas id="lpA${i}"></canvas></div></div>
            <div class="lp-chart-card"><div class="lp-chart-title">Checkout Rate (PV→Checkout)</div><div class="lp-chart-h"><canvas id="lpB${i}"></canvas></div></div>
            <div class="lp-chart-card"><div class="lp-chart-title">Taxa Conversão (Checkout→Vendas)</div><div class="lp-chart-h"><canvas id="lpC${i}"></canvas></div></div>
            <div class="lp-chart-card"><div class="lp-chart-title">Taxa Conversão (PV→Vendas)</div><div class="lp-chart-h"><canvas id="lpD${i}"></canvas></div></div>
          </div></div></div>`;
        jobs.push({i,d});
      });
      h+=`</div>`;
      document.getElementById('body').innerHTML=h;
      jobs.forEach(({i,d})=>{ lpLine('lpA'+i,d.labels,d.connect,'#c07be0'); lpLine('lpB'+i,d.labels,d.checkout,'#e0a75e'); lpLine('lpC'+i,d.labels,d.txconv,'#a855c8'); lpLine('lpD'+i,d.labels,d.txconvpv,'#8b7bef'); });
      document.getElementById('updated').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }

    async function loadAll(){
      document.getElementById('body').innerHTML='<div class="loading">Carregando dados da planilha…</div>';
      try{
        const [tMalu,tHire,tMetas,tuMalu,tuHire,tMetr]=await Promise.all([
          gviz(SHEET_WICI,'sheet='+encodeURIComponent('Malu Meta')),
          gviz(SHEET_WICI,'sheet='+encodeURIComponent('Hire Meta')),
          gviz(SHEET_WICI,'sheet='+encodeURIComponent('Metas')).catch(()=>null),
          gviz(UTM_MALU,"gid=0&tq="+encodeURIComponent("select * where A >= date '2026-07-13'")).catch(()=>null),
          gviz(UTM_HIRE,"gid=0&tq="+encodeURIComponent("select * where A >= date '2026-07-13'")).catch(()=>null),
          gviz(SHEET_METR,'sheet='+encodeURIComponent('MÉTRICAS')).catch(()=>null),
        ]);
        DATA.malu=metaRows(tMalu); DATA.hire=metaRows(tHire);
        DATA.umalu=tuMalu?utmRows(tuMalu):[]; DATA.uhire=tuHire?utmRows(tuHire):[];
        DATA.metas=tMetas?readMetas(tMetas):{...METAS_DEFAULT};
        DATA.metricas=tMetr?metricasParse(tMetr):null;
        // Cost vem em US$ (conta do Meta) → converte p/ R$ pela cotação (aba Metas ou 5,16)
        const cot = DATA.metas.cotacao || 5.16;
        DATA.malu.forEach(r=>{ r.cost *= cot; });
        DATA.hire.forEach(r=>{ r.cost *= cot; });
        route();
      }catch(e){
        document.getElementById('body').innerHTML='<div class="empty err">Erro ao carregar: '+e.message+'</div>';
      }
    }
    loadAll();
  </script>
</body>
